<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finanças Elite Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { background-color: #ffffff; color: #0f172a; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: #ffffff; border: 1px solid #f1f5f9; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        .gradient-ganho { background: linear-gradient(135deg, #10b981, #059669); }
        .gradient-gasto { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .tab-relatorio { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="p-6 pb-20">

    <div class="flex justify-between items-start mb-8 pt-4">
        <div>
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.2em] mb-1">Saldo Disponível</p>
            <h1 id="saldo-total" class="text-4xl font-extrabold tracking-tight text-slate-900">R$ 0,00</h1>
        </div>
        <button onclick="toggleRelatorio()" class="bg-slate-50 text-slate-500 text-[10px] font-bold px-4 py-2.5 rounded-full border border-slate-100 active:scale-95 transition">
            RELATÓRIOS
        </button>
    </div>

    <div id="aba-detalhes" class="hidden tab-relatorio mb-10 overflow-hidden">
        <div class="glass-card rounded-[2rem] p-6 bg-slate-50/50 border-blue-100">
            <h3 class="text-sm font-bold text-slate-800 mb-5 flex items-center gap-2">
                <span class="w-1.5 h-4 bg-blue-500 rounded-full"></span> Resumo Mensal
            </h3>
            <div class="space-y-6">
                <div>
                    <p class="text-[10px] font-black text-blue-600 uppercase mb-3 tracking-widest">Este Mês</p>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white p-3 rounded-2xl border border-slate-100">
                            <p class="text-[9px] text-slate-400 font-bold uppercase">Entrou</p>
                            <p class="text-green-600 font-extrabold">+ R$ <span id="ganho-mes">0,00</span></p>
                        </div>
                        <div class="bg-white p-3 rounded-2xl border border-slate-100">
                            <p class="text-[9px] text-slate-400 font-bold uppercase">Saiu</p>
                            <p class="text-red-500 font-extrabold">- R$ <span id="gasto-mes">0,00</span></p>
                        </div>
                    </div>
                </div>
                <div class="pt-4 border-t border-slate-200/60 flex justify-between items-center">
                    <span class="text-xs font-bold text-slate-500 uppercase">Resultado Líquido</span>
                    <span id="resultado-mes" class="font-black text-slate-900 text-lg">R$ 0,00</span>
                </div>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-12">
        <button onclick="abrirModal('entrada')" class="gradient-ganho h-20 rounded-[1.5rem] flex flex-col items-center justify-center text-white shadow-lg active:scale-95 transition shadow-green-200">
            <span class="text-2xl font-light">⊕</span>
            <span class="text-[10px] font-black tracking-widest uppercase">Ganho</span>
        </button>
        <button onclick="abrirModal('saida')" class="gradient-gasto h-20 rounded-[1.5rem] flex flex-col items-center justify-center text-white shadow-lg active:scale-95 transition shadow-red-200">
            <span class="text-2xl font-light">⊖</span>
            <span class="text-[10px] font-black tracking-widest uppercase">Gasto</span>
        </button>
    </div>

    <div class="flex justify-between items-center mb-6">
        <h2 class="text-sm font-black text-slate-900 uppercase tracking-widest">Atividade Recente</h2>
        <span class="w-10 h-[1px] bg-slate-200"></span>
    </div>
    
    <div id="historico" class="space-y-4"></div>

    <div id="modal" class="hidden fixed inset-0 bg-white/80 backdrop-blur-xl z-50 flex items-end sm:items-center justify-center">
        <div class="bg-white w-full max-w-sm p-8 rounded-t-[3rem] sm:rounded-[3rem] shadow-2xl border border-slate-100">
            <div class="w-12 h-1.5 bg-slate-100 rounded-full mx-auto mb-8 sm:hidden"></div>
            <h3 id="modal-titulo" class="text-2xl font-black mb-8 text-slate-900"></h3>
            <div class="space-y-6">
                <div class="relative">
                    <span class="absolute left-0 top-1/2 -translate-y-1/2 text-slate-300 font-bold text-xl">R$</span>
                    <input type="number" id="valor" placeholder="0,00" class="w-full bg-transparent border-b-2 border-slate-100 p-4 pl-8 text-4xl font-black outline-none focus:border-slate-900 transition">
                </div>
                <input type="text" id="descricao" placeholder="O que foi isso?" class="w-full bg-slate-50 p-5 rounded-2xl text-lg font-medium outline-none border border-transparent focus:border-slate-200">
            </div>
            <div class="flex gap-4 mt-10">
                <button onclick="fecharModal()" class="flex-1 text-slate-400 font-bold py-5">CANCELAR</button>
                <button onclick="salvar()" class="flex-1 bg-slate-900 text-white rounded-2xl font-black py-5 shadow-xl active:scale-95 transition">SALVAR</button>
            </div>
        </div>
    </div>

    <script>
        // Sistema de ID corrigido para evitar erros (Data atual + aleatório)
        let transacoes = JSON.parse(localStorage.getItem('fin_v5_pro')) || [];
        let tipoAt = 'entrada';

        function atualizarUI() {
            localStorage.setItem('fin_v5_pro', JSON.stringify(transacoes));
            
            const agora = new Date();
            const mAtual = agora.getMonth();
            const aAtual = agora.getFullYear();

            const saldo = transacoes.reduce((acc, t) => t.tipo === 'entrada' ? acc + t.valor : acc - t.valor, 0);
            document.getElementById('saldo-total').innerText = `R$ ${saldo.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;

            // Lógica de Detalhamento
            const dadosMes = transacoes.filter(t => {
                const d = new Date(t.ts);
                return d.getMonth() === mAtual && d.getFullYear() === aAtual;
            });

            const gMes = dadosMes.filter(t => t.tipo === 'entrada').reduce((a, b) => a + b.valor, 0);
            const sMes = dadosMes.filter(t => t.tipo === 'saida').reduce((a, b) => a + b.valor, 0);
            const rMes = gMes - sMes;

            document.getElementById('ganho-mes').innerText = gMes.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            document.getElementById('gasto-mes').innerText = sMes.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            document.getElementById('resultado-mes').innerText = `R$ ${rMes.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            document.getElementById('resultado-mes').style.color = rMes >= 0 ? '#10b981' : '#ef4444';

            // Lista de Histórico
            document.getElementById('historico').innerHTML = transacoes.map(t => `
                <div class="glass-card p-5 rounded-3xl flex justify-between items-center active:bg-slate-50 transition">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-2xl flex items-center justify-center text-xl ${t.tipo === 'entrada' ? 'bg-green-50 text-green-600' : 'bg-red-50 text-red-600'}">
                            ${t.tipo === 'entrada' ? '↗' : '↘'}
                        </div>
                        <div>
                            <p class="font-bold text-slate-800 text-sm">${t.descricao}</p>
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-tighter">${new Date(t.ts).toLocaleDateString('pt-BR')}</p>
                        </div>
                    </div>
                    <span class="font-black text-sm ${t.tipo === 'entrada' ? 'text-green-600' : 'text-slate-900'}">
                        ${t.tipo === 'entrada' ? '+' : '-'} R$ ${t.valor.toLocaleString('pt-BR', {minimumFractionDigits: 2})}
                    </span>
                </div>
            `).join('');
        }

        function toggleRelatorio() {
            const aba = document.getElementById('aba-detalhes');
            aba.classList.toggle('hidden');
        }

        function abrirModal(t) {
            tipoAt = t;
            document.getElementById('modal-titulo').innerText = t === 'entrada' ? 'Novo Ganho' : 'Novo Gasto';
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('valor').focus();
        }

        function fecharModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('valor').value = '';
            document.getElementById('descricao').value = '';
        }

        function salvar() {
            const v = parseFloat(document.getElementById('valor').value);
            const d = document.getElementById('descricao').value || 'Diversos';
            if(!v) return;

            // Uso de Date.now() para ID, removendo erro de uuidv4
            transacoes.unshift({
                id: Date.now() + Math.random(),
                tipo: tipoAt,
                valor: v,
                descricao: d,
                ts: Date.now()
            });

            fecharModal();
            atualizarUI();
        }

        atualizarUI();
    </script>
</body>
</html>
