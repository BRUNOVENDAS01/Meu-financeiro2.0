<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    
    <title>Finanças Black</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background-color: #000000; color: #ffffff; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .card-dark { background: #121212; border: 1px solid #1f1f1f; }
        .btn-action { background: #1a1a1a; border: 1px solid #333; transition: all 0.2s; }
        .btn-action:active { background: #333; scale: 0.95; }
        /* Esconde a barra de rolagem */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-6 pb-24">

    <div class="flex justify-between items-start mb-8 pt-6">
        <div>
            <div class="flex items-center gap-2 mb-1">
                <p class="text-gray-500 text-[10px] font-bold uppercase tracking-widest">Saldo Total</p>
                <button onclick="toggleVisibilidade()" class="text-gray-600 text-xs">
                    <span id="eye-icon">👁️</span>
                </button>
            </div>
            <h1 id="saldo-total" class="text-3xl font-extrabold tracking-tight">R$ 0,00</h1>
        </div>
        <button onclick="document.getElementById('relatorio').classList.toggle('hidden')" class="bg-[#1a1a1a] text-gray-400 text-[9px] font-bold px-4 py-2 rounded-full border border-[#333]">
            RELATÓRIOS
        </button>
    </div>

    <div id="relatorio" class="hidden mb-8 animate-in fade-in duration-300">
        <div class="card-dark rounded-3xl p-5">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <p class="text-[9px] text-gray-500 font-bold uppercase mb-1">Ganhos</p>
                    <p class="text-green-500 font-bold text-sm">+ R$ <span id="ganho-mes">0,00</span></p>
                </div>
                <div class="border-l border-[#222] pl-4">
                    <p class="text-[9px] text-gray-500 font-bold uppercase mb-1">Gastos</p>
                    <p class="text-red-500 font-bold text-sm">- R$ <span id="gasto-mes">0,00</span></p>
                </div>
            </div>
        </div>
    </div>

    <div class="flex gap-3 mb-10">
        <button onclick="abrirModal('entrada')" class="flex-1 btn-action h-12 rounded-2xl flex items-center justify-center gap-2">
            <div class="w-1.5 h-1.5 rounded-full bg-green-500"></div>
            <span class="text-[10px] font-bold uppercase tracking-wider text-gray-300">Entrada</span>
        </button>
        <button onclick="abrirModal('saida')" class="flex-1 btn-action h-12 rounded-2xl flex items-center justify-center gap-2">
            <div class="w-1.5 h-1.5 rounded-full bg-red-500"></div>
            <span class="text-[10px] font-bold uppercase tracking-wider text-gray-300">Saída</span>
        </button>
    </div>

    <div id="historico" class="space-y-3"></div>

    <div id="modal" class="hidden fixed inset-0 bg-black/95 z-50 flex items-center justify-center p-6">
        <div class="w-full max-w-xs">
            <h3 id="modal-titulo" class="text-center text-gray-500 font-bold text-xs uppercase mb-8"></h3>
            <input type="hidden" id="edit-id">
            <input type="number" id="valor" placeholder="0.00" class="w-full bg-transparent text-center text-5xl font-extrabold outline-none mb-8">
            <input type="text" id="descricao" placeholder="Descrição" class="w-full bg-[#121212] border border-[#222] p-4 rounded-2xl text-center mb-8 outline-none">
            <div class="flex gap-4">
                <button onclick="fecharModal()" class="flex-1 text-gray-600 font-bold text-xs">VOLTAR</button>
                <button onclick="salvar()" class="flex-1 bg-white text-black rounded-2xl font-bold text-xs py-4">CONFIRMAR</button>
            </div>
        </div>
    </div>

    <script>
        let transacoes = JSON.parse(localStorage.getItem('fin_black_v1')) || [];
        let oculto = false;
        let saldoReal = 0;

        function atualizarUI() {
            localStorage.setItem('fin_black_v1', JSON.stringify(transacoes));
            saldoReal = transacoes.reduce((acc, t) => t.tipo === 'entrada' ? acc + t.valor : acc - t.valor, 0);
            
            const gMes = transacoes.filter(t => t.tipo === 'entrada').reduce((a, b) => a + b.valor, 0);
            const sMes = transacoes.filter(t => t.tipo === 'saida').reduce((a, b) => a + b.valor, 0);
            
            document.getElementById('ganho-mes').innerText = gMes.toFixed(2);
            document.getElementById('gasto-mes').innerText = sMes.toFixed(2);
            
            renderSaldo();

            document.getElementById('historico').innerHTML = transacoes.map(t => `
                <div class="card-dark p-4 rounded-2xl flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <div class="w-1 h-1 rounded-full ${t.tipo === 'entrada' ? 'bg-green-500' : 'bg-red-500'}"></div>
                        <div>
                            <p class="font-bold text-xs text-gray-200">${t.descricao}</p>
                            <p class="text-[8px] text-gray-600 uppercase">${new Date(t.ts).toLocaleDateString()}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-bold text-xs ${t.tipo === 'entrada' ? 'text-green-500' : 'text-gray-200'}">
                            ${oculto ? '••••' : 'R$ ' + t.valor.toFixed(2)}
                        </span>
                        <button onclick="excluir('${t.id}')" class="text-[10px] opacity-30">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        function renderSaldo() {
            const el = document.getElementById('saldo-total');
            el.innerText = oculto ? 'R$ ••••••' : `R$ ${saldoReal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
        }

        function toggleVisibilidade() {
            oculto = !oculto;
            document.getElementById('eye-icon').innerText = oculto ? '🙈' : '👁️';
            atualizarUI();
        }

        function abrirModal(t, id = null) {
            tipoAt = t;
            document.getElementById('modal-titulo').innerText = t === 'entrada' ? 'Adicionar Ganho' : 'Adicionar Gasto';
            document.getElementById('modal').classList.remove('hidden');
            if(!id) { document.getElementById('valor').value = ''; document.getElementById('descricao').value = ''; }
        }

        function fecharModal() { document.getElementById('modal').classList.add('hidden'); }

        function salvar() {
            const v = parseFloat(document.getElementById('valor').value);
            const d = document.getElementById('descricao').value || 'Geral';
            if(!v) return;
            transacoes.unshift({ id: Date.now(), tipo: tipoAt, valor: v, descricao: d, ts: Date.now() });
            fecharModal(); atualizarUI();
        }

        function excluir(id) { if(confirm("Apagar?")) { transacoes = transacoes.filter(t => t.id != id); atualizarUI(); } }

        atualizarUI();
    </script>
</body>
</html>
